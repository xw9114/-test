<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Chaoxing AI fixture</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .question-item { margin: 14px 0; padding: 12px; border: 1px solid #ccc; }
    label { display: block; margin: 5px 0; }
    .custom-option { display: flex; gap: 10px; align-items: center; margin: 6px 0; cursor: pointer; }
    .custom-key { display: grid; place-items: center; width: 32px; height: 32px; border: 1px solid #ccd4df; border-radius: 50%; color: #283548; background: #fff; }
    .custom-option.selected .custom-key { color: #fff; background: #4f74e8; }
    .questionLi input[type="radio"] { display: none; }
    .answerBg { display: flex; gap: 10px; align-items: center; margin: 6px 0; cursor: pointer; }
    .num_option { display: grid; place-items: center; width: 32px; height: 32px; border: 1px solid #ccd4df; border-radius: 50%; }
    .num_option.check_answer { color: #fff; background: #4f74e8; }
    [role="dialog"] { display: none; position: fixed; inset: 30% 35%; padding: 20px; background: white; border: 2px solid #222; }
    [role="dialog"].open { display: block; }
    iframe { width: 100%; height: 230px; border: 1px solid #999; }
  </style>
</head>
<body>
  <main>
    <section class="question-item" id="single">
      <h3 class="question-title">1. 单选题：2 + 2 等于多少？</h3>
      <label><input type="radio" name="single" value="A"> A. 4</label>
      <label><input type="radio" name="single" value="B"> B. 5</label>
    </section>

    <section class="question-item" id="multiple">
      <h3 class="question-title">2. 多选题：下列哪些是质数？</h3>
      <label><input type="checkbox" name="multiple" value="A"> A. 2</label>
      <label><input type="checkbox" name="multiple" value="B"> B. 4</label>
      <label><input type="checkbox" name="multiple" value="C"> C. 5</label>
    </section>

    <section class="question-item" id="judgement">
      <h3 class="question-title">3. 判断题：地球围绕太阳运行。</h3>
      <label><input type="radio" name="judge" value="A"> A. 正确</label>
      <label><input type="radio" name="judge" value="B"> B. 错误</label>
    </section>

    <section class="question-item" id="fill">
      <h3 class="question-title">4. 填空题：法国首都是____，2的平方是____。</h3>
      <input type="text" aria-label="blank one">
      <input type="text" aria-label="blank two">
    </section>

    <section class="question-item" id="short">
      <h3 class="question-title">5. 简答题：为什么需要单元测试？</h3>
      <textarea></textarea>
    </section>

    <section class="new-question-shell" id="custom-single">
      <div class="custom-stem">6.（单选题）我国的首都是（ ）。</div>
      <div class="custom-options">
        <div class="custom-option"><span class="custom-key">A</span><span>上海</span></div>
        <div class="custom-option"><span class="custom-key">B</span><span>北京</span></div>
        <div class="custom-option"><span class="custom-key">C</span><span>广州</span></div>
        <div class="custom-option"><span class="custom-key">D</span><span>深圳</span></div>
      </div>
    </section>

    <section class="questionLi" id="chaoxing-homework-single">
      <div class="mark_name"><span>7.（单选题）</span>参考项目适配器应读取哪个固定选项节点？</div>
      <input type="hidden" name="answertype7" value="0">
      <ul>
        <li><input type="radio" name="homework7"><div class="answerBg"><span class="num_option">A</span><p class="answer_p">随机 div</p></div></li>
        <li><input type="radio" name="homework7"><div class="answerBg"><span class="num_option">B</span><p class="answer_p">answer_p</p></div></li>
        <li><input type="radio" name="homework7"><div class="answerBg"><span class="num_option">C</span><p class="answer_p">mark_title</p></div></li>
      </ul>
    </section>

    <iframe title="cross origin questions" src="http://127.0.0.1:32102/frame.html"></iframe>
    <button id="submit">提交作业</button>
  </main>

  <div role="dialog" id="confirm-dialog">
    <p>确认提交？</p>
    <button id="confirm-submit">确认</button>
  </div>

  <script>
    window.__events = { input: 0, change: 0 };
    document.addEventListener("input", () => { window.__events.input += 1; });
    document.addEventListener("change", () => { window.__events.change += 1; });
    document.querySelectorAll("#custom-single .custom-option").forEach((option) => {
      option.addEventListener("click", () => {
        document.querySelectorAll("#custom-single .custom-option").forEach((item) => item.classList.remove("selected"));
        option.classList.add("selected");
      });
    });
    document.querySelectorAll("#chaoxing-homework-single .answerBg").forEach((option) => {
      option.addEventListener("click", () => {
        document.querySelectorAll("#chaoxing-homework-single .num_option").forEach((item) => item.classList.remove("check_answer"));
        const input = option.closest("li").querySelector("input[type='radio']");
        input.checked = true;
        option.querySelector(".num_option").classList.add("check_answer");
      });
    });
    document.querySelector("#submit").addEventListener("click", () => {
      document.querySelector("#confirm-dialog").classList.add("open");
    });
    document.querySelector("#confirm-submit").addEventListener("click", () => {
      document.documentElement.dataset.submitted = "true";
      document.querySelector("#confirm-dialog").classList.remove("open");
    });
  </script>
</body>
</html>
